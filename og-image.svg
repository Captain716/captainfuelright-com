      <stop offset="55%" stop-color="#0b2545"/>
      <stop offset="100%" stop-color="#0052cc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top kicker -->
  <text x="600" y="155" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800" fill="#d69e2e" text-anchor="middle" letter-spacing="12">RUN CLEAN. RUN SMART.</text>

  <!-- Main brand -->
  <text x="600" y="290" font-family="Inter, Arial, sans-serif" font-size="96" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">CAPTAIN FUEL RIGHT</text>

